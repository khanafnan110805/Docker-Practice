<html>
  <script>
    function editProfile() {
      document.querySelector(".container").style.display = "none";
      document.querySelector(".container-edit").style.display = "block";

      const name = document.querySelector("#name").textContent;
      document.querySelector("#input-name").value = name;

      const email = document.querySelector("#email").textContent;
      document.querySelector("#input-email").value = email;

      const interests = document.querySelector("#interests").textContent;
      document.querySelector("#input-interests").value = interests;
    }

    function saveProfile() {
      var postObj = {
        name: document.querySelector("#input-name").value,
        email: document.querySelector("#input-email").value,
        interests: document.querySelector("#input-interests").value,
      };

      fetch("/update-profile", {
        method: "POST",
        headers: {
          Accept: "application/json, text/plain, */*",
          "Content-Type": "application/json",
        },
        body: JSON.stringify(postObj),
      })
        .then(function (response) {
          return response.json();
        })
        .then(function (data) {
          document.querySelector("#name").textContent = data.name;
          document.querySelector("#email").textContent = data.email;
          document.querySelector("#interests").textContent = data.interests;

          document.querySelector(".container").style.display = "block";
          document.querySelector(".container-edit").style.display = "none";
        })
        .catch(function (err) {
          console.log(err);
        });
    }

    function getProfile() {
      fetch("/get-profile")
        .then(function (response) {
          return response.json();
        })
        .then(function (data) {
          if (data.img)
            document.querySelector("#profile-picture").src = data.img;

          document.querySelector("#name").textContent = data.name;
          document.querySelector("#email").textContent = data.email;
          document.querySelector("#interests").textContent = data.interests;
        });
    }

    getProfile();
  </script>

  <style>
    .container {
      display: block;
    }

    .container-edit {
      display: none;
    }

    img {
      width: 200px;
      height: 200px;
    }

    .button {
      padding: 5px;
      margin: 5px;
    }
  </style>

  <body>
    <div class="container">
      <h1 id="header">User Profile</h1>

      <img id="profile-picture" src="/profile-picture" />

      <p>Name:</p>
      <h3 id="name">Anna Smith</h3>
      <hr />

      <p>Email:</p>
      <h3 id="email">anna.smith@example.com</h3>
      <hr />

      <p>Interests:</p>
      <h3 id="interests">coding</h3>
      <hr />

      <button class="button" onclick="editProfile()">Edit Profile</button>
    </div>

    <div class="container-edit">
      <h1 id="header">User Profile</h1>

      <img id="profile-picture" src="/profile-picture" />

      <p>Name:</p>
      <input id="input-name" type="text" />
      <hr />

      <p>Email:</p>
      <input id="input-email" type="email" />
      <hr />

      <p>Interests:</p>
      <input id="input-interests" type="text" />
      <hr />

      <button class="button" onclick="saveProfile()">Save Profile</button>
    </div>
  </body>
</html>
